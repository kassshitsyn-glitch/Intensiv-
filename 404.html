<html lang="ru">
<head>

<style>body{font-family:-apple-system,Segoe UI,Roboto,sans-serif;display:flex;min-height:100vh;align-items:center;justify-content:center;text-align:center;padding:20px}a{color:#e74c3c}</style>
<script>
(function(){
  var target='/klienty/';
  // редиректим только один раз и только если мы НЕ на целевой странице
  if (location.pathname.indexOf('/klienty') !== 0 && !sessionStorage.getItem('r404')) {
    sessionStorage.setItem('r404','1');
    location.replace(target);
  }
})();
</script>
</head>
<body>
<div>
<h1>Страница не найдена</h1>

</div>
</body>
